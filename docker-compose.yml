version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: lexwrite-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: lexwrite
      POSTGRES_PASSWORD: lexwrite_dev
      POSTGRES_DB: lexwrite_ai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
